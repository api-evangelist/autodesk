  - type: Features
    data:
      - name: OAuth 2.0 Authentication
        description: >-
          Industry-standard OAuth 2.0 authentication enabling secure access to
          Autodesk platform services and user data across all APS APIs.
      - name: Design File Translation
        description: >-
          Model Derivative API translates over 60 CAD file formats to web-viewable
          SVF and SVF2 formats, enabling browser-based 3D visualization.
      - name: Cloud Design Automation
        description: >-
          Design Automation API enables batch processing of CAD operations at
          scale using cloud engines for AutoCAD, Revit, Inventor, and Fusion.
      - name: Digital Twins
        description: >-
          Tandem Data API enables building digital twin applications by connecting
          BIM model data with IoT sensors, asset management, and facility systems.
      - name: Construction Cloud Integration
        description: >-
          ACC APIs provide programmatic access to construction project management,
          issues, RFIs, submittals, cost, and coordination data.
      - name: Sustainability Data
        description: >-
          Access to regional environmental and carbon emissions data for
          integrating sustainability calculations into design workflows.
      - name: Reality Capture
        description: >-
          Photogrammetry-based 3D model generation from photographs using
          cloud-scale structure-from-motion algorithms.
  - type: UseCases
    data:
      - name: Custom Viewer Applications
        description: >-
          Building web applications that display BIM and CAD models using the
          Viewer SDK with custom extensions, toolbars, and interactive features.
      - name: Construction Project Automation
        description: >-
          Automating construction project workflows through ACC APIs for issues,
          RFIs, submittals, and cost management with ERP and MES integrations.
      - name: Digital Twin Development
        description: >-
          Building facility digital twin applications connecting BIM data with
          live IoT sensor streams, maintenance systems, and energy monitoring.
      - name: Design Batch Processing
        description: >-
          Automating batch generation of drawings, BOMs, and reports from design
          models using Design Automation API cloud engines at enterprise scale.
      - name: AEC Data Analytics
        description: >-
          Extracting and analyzing design element data, model properties, and
          project metrics using AEC Data Model GraphQL API for reporting.
  - type: Integrations
    data:
      - name: Revit
        description: >-
          Deep integration with Autodesk Revit for BIM data access, parameter
          management, and design automation via APS APIs.
      - name: AutoCAD
        description: >-
          Integration with AutoCAD for cloud-based drawing generation and data
          extraction via the Design Automation API.
      - name: Salesforce
        description: >-
          CRM and project management integration connecting Autodesk construction
          data with Salesforce customer and project records.
      - name: SAP
        description: >-
          ERP integration connecting ACC cost management and project data with
          SAP for enterprise financial reporting and project accounting.
