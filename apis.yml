aid: autodesk
name: Autodesk
description: >-
  Autodesk is a global leader in design, engineering, and entertainment
  software, providing cloud-connected platform APIs through Autodesk Platform
  Services (APS). APS APIs enable developers to build applications that access
  design data, automate workflows, visualize 3D models, manage construction
  projects, create digital twins, and integrate sustainability data across
  Autodesk's product ecosystem including AutoCAD, Revit, Inventor, Maya, BIM
  360, and Autodesk Construction Cloud.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - 3D Modeling
  - Architecture
  - BIM
  - CAD
  - Construction
  - Design
  - Digital Twins
  - Engineering
  - Manufacturing
  - Media and Entertainment
  - Sustainability
url: >-
  https://raw.githubusercontent.com/api-evangelist/autodesk/refs/heads/main/apis.yml
created: '2024-11-13'
modified: '2026-04-19'
