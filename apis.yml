  - aid: autodesk:acc-locations-api
    name: Autodesk ACC Locations API
    tags:
      - Construction
      - Locations
      - Project Management
    humanURL: 
      https://aps.autodesk.com/developer/overview/autodesk-construction-cloud
    properties:
      - url: 
          https://aps.autodesk.com/developer/overview/autodesk-construction-cloud
        type: Documentation
    description: The ACC Locations API enables configuration of project location
