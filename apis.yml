        type: API Reference
      - url: openapi/autodesk-flow-graph-engine-openapi.yml
        type: OpenAPI
    description: The Flow Graph Engine API enables evaluation of Bifrost graphs 
      in the cloud for media and entertainment workflows, allowing developers to
      offload heavy processing tasks like creating complex effects and 
      simulations to concurrent cloud operations.
  - aid: autodesk:acc-account-admin-api
    name: Autodesk ACC Account Admin API
    tags:
      - Construction
      - Account Administration
      - Project Management
    humanURL: https://aps.autodesk.com/en/docs/acc/v1/tutorials/admin
