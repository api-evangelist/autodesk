apis:
  - aid: autodesk:autodesk
    name: Autodesk
    tags:
      - API
    humanURL: https://aps.autodesk.com/blog/autodesk-build-photos-api
    properties:
      - url: https://aps.autodesk.com/blog/autodesk-build-photos-api
        type: Documentation
    description: It provides a single, unified place to view and manage photos 
      and videos in Autodesk Build. This is useful, such as for documenting 
      progress photos.
  - aid: autodesk:authentication-api
    name: Autodesk Authentication API
    tags:
      - Authentication
      - OAuth
    humanURL: https://aps.autodesk.com/developer/overview/authentication-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/authentication-api
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/oauth/v2
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/oauth/v2/reference/http
        type: API Reference
      - url: https://aps.autodesk.com/en/docs/oauth/v2/tutorials
        type: Getting Started
      - url: openapi/autodesk-authentication-openapi.yml
        type: OpenAPI
    description: The Authentication API provides OAuth 2.0 based authentication 
      and authorization for Autodesk Platform Services, enabling applications to
      securely access user data across different services without directly 
      handling user passwords.
  - aid: autodesk:data-management-api
    name: Autodesk Data Management API
    tags:
      - Data Management
      - BIM 360
      - Storage
    humanURL: https://aps.autodesk.com/developer/overview/data-management-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/data-management-api
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/data/v2/developers_guide/overview/
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/data/v2/tutorials/
        type: Getting Started
      - url: openapi/autodesk-data-management-openapi.yml
        type: OpenAPI
    description: The Data Management API enables management of data across 
      Autodesk Docs, BIM 360 Docs, Fusion Team, and the Object Storage Service. 
      It provides project navigation, folder management, and version control for
      items stored across Autodesk cloud services.
  - aid: autodesk:model-derivative-api
    name: Autodesk Model Derivative API
    tags:
      - 3D Models
      - File Conversion
      - Metadata
    humanURL: https://aps.autodesk.com/developer/overview/model-derivative-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/model-derivative-api
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/model-derivative/v2
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/model-derivative/v2/reference/
        type: API Reference
      - url: https://aps.autodesk.com/en/docs/model-derivative/v2/tutorials/
        type: Getting Started
      - url: openapi/autodesk-model-derivative-openapi.yml
        type: OpenAPI
    description: The Model Derivative API translates designs into formats like 
      SVF and SVF2 for rendering in the Viewer, supports over 60 file input 
      formats, converts designs to STL and OBJ, and extracts object hierarchy 
      trees, properties, and geometries for analysis.
  - aid: autodesk:design-automation-api
    name: Autodesk Automation API
    tags:
      - Automation
      - AutoCAD
      - Revit
      - Inventor
      - 3ds Max
      - Fusion
    humanURL: https://aps.autodesk.com/developer/overview/automation-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/automation-api
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/design-automation/v3
        type: Documentation
      - url: openapi/autodesk-design-automation-openapi.yml
        type: OpenAPI
    description: The Automation API enables batch processing of design files, 
      parameter adjustments, drawing generation, and data extraction at 
      enterprise scale using AutoCAD, Revit, Inventor, 3ds Max, and Fusion cloud
      engines.
  - aid: autodesk:viewer-sdk
    name: Autodesk Viewer SDK
    tags:
      - Viewer
      - 3D Visualization
      - 2D Visualization
    humanURL: https://aps.autodesk.com/developer/overview/viewer-sdk
    properties:
      - url: https://aps.autodesk.com/developer/overview/viewer-sdk
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/viewer/v7
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/viewer/v7/developers_guide/
        type: Getting Started
    description: The Viewer SDK is a JavaScript library for building interactive
      web applications that display 2D and 3D design models. It supports various
      file formats, offers customizable toolbars, and provides a flexible 
      extension framework for creating immersive design experiences.
  - aid: autodesk:webhooks-api
    name: Autodesk Webhooks API
    tags:
      - Webhooks
      - Events
      - Notifications
    humanURL: https://aps.autodesk.com/webhooks-api
    properties:
      - url: https://aps.autodesk.com/webhooks-api
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/webhooks/v1
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/webhooks/v1/reference/
        type: API Reference
      - url: https://aps.autodesk.com/en/docs/webhooks/v1/tutorials/
        type: Getting Started
      - url: openapi/autodesk-webhooks-openapi.yml
        type: OpenAPI
      - url: asyncapi/autodesk-webhooks-asyncapi.yml
        type: AsyncAPI
    description: The Webhooks API enables applications to receive event 
      notifications via POST requests to a callback URL, eliminating the need 
      for continuous polling. It works with Data Management and Model Derivative
      APIs to monitor events like file modifications within projects.
  - aid: autodesk:reality-capture-api
    name: Autodesk Reality Capture API
    tags:
      - Reality Capture
      - Photogrammetry
      - 3D Models
      - Point Clouds
    humanURL: https://aps.autodesk.com/developer/overview/reality-capture-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/reality-capture-api
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/reality-capture/v1/developers_guide/overview/
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/reality-capture/v1/tutorials/create-3d-mesh-from-photos/
        type: Getting Started
      - url: openapi/autodesk-reality-capture-openapi.yml
        type: OpenAPI
    description: The Reality Capture API uses photogrammetry techniques to 
      generate high-resolution 3D models, point clouds, and orthophotos from 
      photographs. It leverages cloud computing for structure-from-motion and 
      multi-view-geometry algorithms, with output compatible with ReCap, Civil 
      3D, and InfraWorks.
  - aid: autodesk:aec-data-model-api
    name: Autodesk AEC Data Model API
    tags:
      - AEC
      - BIM
      - GraphQL
      - Design Data
    humanURL: https://aps.autodesk.com/developer/overview/aec-data-model-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/aec-data-model-api
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/aecdatamodel/v1/developers_guide/overview/
        type: Documentation
      - url: https://aps.autodesk.com/autodesk-aec-data-model-api
        type: Landing Page
    description: The AEC Data Model API provides direct cloud access to granular
      design data via GraphQL, enabling navigation through data structures from 
      hubs and projects to individual elements and parameters without requiring 
      desktop authoring plugins. Currently offers read-only access to Revit 
      elements and properties.
  - aid: autodesk:data-exchange-api
    name: Autodesk Data Exchange API
    tags:
      - Data Exchange
      - Interoperability
      - BIM
      - CAD
    humanURL: https://aps.autodesk.com/developer/overview/data-exchange
    properties:
      - url: https://aps.autodesk.com/developer/overview/data-exchange
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/fdxgraph/v1/reference/graphql_endpoint/
        type: API Reference
      - url: 
          https://aps.autodesk.com/en/docs/fdxgraph/v1/tutorials/getting_started/task1/
        type: Getting Started
    description: The Data Exchange API enables seamless sharing of complete or 
      selective 3D model data across BIM, CAD, and other business applications 
      through Autodesk Docs. It supports both GraphQL API and .NET SDK for 
      querying and building custom integrations.
  - aid: autodesk:sustainability-data-api
    name: Autodesk Sustainability Data API
    tags:
      - Sustainability
      - Environmental Data
      - Carbon Calculations
    humanURL: 
      https://aps.autodesk.com/developer/overview/sustainability-data-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/sustainability-data-api
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/sustainability/v3/developers_guide/overview/
        type: Documentation
      - url: https://aps.autodesk.com/en/docs/sustainability/v3/reference/http/
        type: API Reference
      - url: 
          https://aps.autodesk.com/en/docs/sustainability/v3/tutorials/tutorial_01/
        type: Getting Started
      - url: openapi/autodesk-sustainability-data-openapi.yml
        type: OpenAPI
    description: The Sustainability Data API provides access to regional 
      environmental data through a standardized interface, enabling accurate 
      carbon calculations and integration of trusted third-party sustainability 
      datasets into applications at all design stages.
  - aid: autodesk:parameters-api
    name: Autodesk Parameters API
    tags:
      - Parameters
      - BIM
      - Revit
    humanURL: https://aps.autodesk.com/developer/overview/parameters-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/parameters-api
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/parameters/v1/overview/introduction/
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/parameters/v1/tutorials/getting-started/
        type: Getting Started
      - url: openapi/autodesk-parameters-openapi.yml
        type: OpenAPI
    description: The Parameters API manages parameter definitions and related 
      metadata in the Autodesk platform cloud, including parameters, groups, 
      collections, labels, and classifications. It enables synchronized, 
      up-to-date parameter collections across products with support for 
      disciplines, specs, units, and Revit categories.
  - aid: autodesk:tandem-data-api
    name: Autodesk Tandem Data API
    tags:
      - Digital Twins
      - Facility Management
      - IoT
    humanURL: https://aps.autodesk.com/developer/overview/tandem-data-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/tandem-data-api
        type: Documentation
      - url: 
          https://aps.autodesk.com/en/docs/tandem/v1/developers_guide/overview/
        type: Documentation
      - url: openapi/autodesk-tandem-data-openapi.yml
        type: OpenAPI
    description: The Tandem Data API enables reading BIM model data and 
      reading/writing custom schema properties for facility management. It 
      facilitates integration with external systems like asset management 
      platforms, work-order systems, and IoT sensors for creating and managing 
      digital twins.
  - aid: autodesk:flow-graph-engine-api
    name: Autodesk Flow Graph Engine API
    tags:
      - Media & Entertainment
      - Bifrost
      - Cloud Computing
    humanURL: https://aps.autodesk.com/developer/overview/flow-graph-engine-api
    properties:
      - url: https://aps.autodesk.com/developer/overview/flow-graph-engine-api
