specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Autodesk
providerId: autodesk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - 3D Modeling
  - BIM
  - CAD
  - Construction
  - Design
  - Engineering
  - Manufacturing
description: Autodesk Platform Services (APS, formerly Forge) APIs are priced via Cloud Credits, where
  certain operations (notably Model Derivative translation jobs, Design Automation cloud-engine minutes,
  Reality Capture photo processing) consume credits drawn from a pre-purchased balance. Other APIs
  (Authentication, Data Management, Webhooks, Viewer SDK) are free to call. Bundle pricing requires sign-in
  to the APS console; the public pricing page is gated for unauthenticated users. Underlying Autodesk
  product subscriptions (AutoCAD, Revit, Inventor, Maya, etc.) are sold per-seat per-month/year.
sources:
  - https://aps.autodesk.com/pricing
  - https://www.autodesk.com/pricing
  - https://aps.autodesk.com/developer/overview
notes: APS pricing page is gated and was not directly fetchable; specific Cloud Credit rates and free
  monthly allowance values should be verified against the live console. Per-API rates for Model Derivative
  / Design Automation / Reality Capture / Data Exchange exist but are not reproduced here without source
  verification.
plans:
  - id: autodesk-aps-free-apis
    name: APS Free APIs
    type: freemium
    description: APS APIs that are free to call without consuming Cloud Credits.
    entries:
      - label: Authentication API calls
        name: auth_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Data Management API calls
        name: data_mgmt_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Webhooks API calls
        name: webhooks_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Viewer SDK
        name: viewer_sdk
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Authentication API
      - name: Data Management API
      - name: Webhooks API
      - name: Viewer SDK
  - id: autodesk-aps-cloud-credits
    name: APS Cloud Credits
    type: usage-based
    description: Pre-purchased Cloud Credit balance consumed by chargeable APS APIs (Model Derivative,
      Design Automation, Reality Capture, Data Exchange). Per-operation credit cost is documented in the
      APS console.
    entries:
      - label: Model Derivative translation
        name: model_derivative
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see APS Cloud Credits pricing in console
        userMultiplied: false
      - label: Design Automation cloud-engine minutes
        name: design_automation
        type: metered
        metric: minute
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see APS Cloud Credits pricing in console
        userMultiplied: false
      - label: Reality Capture processing
        name: reality_capture
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see APS Cloud Credits pricing in console
        userMultiplied: false
      - label: Data Exchange operations
        name: data_exchange
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see APS Cloud Credits pricing in console
        userMultiplied: false
    elements:
      - name: Model Derivative API
      - name: Design Automation API
      - name: Reality Capture API
      - name: Data Exchange API
      - name: AEC Data Model API
      - name: Sustainability Data API
  - id: autodesk-product-subscriptions
    name: Autodesk Product Subscriptions
    type: subscription
    description: Underlying Autodesk product subscriptions (AutoCAD, Revit, Inventor, Maya, 3ds Max, Fusion)
      sold per-seat. APS API access can be tied to a product entitlement for end-user-bound operations.
    entries:
      - label: Per-seat product subscription
        name: product_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: varies by product (see autodesk.com/pricing)
        userMultiplied: true
    elements:
      - name: AutoCAD
      - name: Revit
      - name: Inventor
      - name: Maya
      - name: 3ds Max
      - name: Fusion
maintainers:
