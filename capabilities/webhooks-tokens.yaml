naftiko: 1.0.0-alpha2
info:
  label: Autodesk Webhooks API — Tokens
  description: 'Autodesk Webhooks API — Tokens. 2 operations. Lead operation: Autodesk Create/Update Webhook Secret Token.
    Self-contained Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: webhooks-tokens
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Webhooks API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: webhooks-v1-tokens-@me
      path: /webhooks/v1/tokens/@me
      operations:
      - name: createtoken
        method: PUT
        description: Autodesk Create/Update Webhook Secret Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetoken
        method: DELETE
        description: Autodesk Delete Webhook Secret Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: webhooks-tokens-rest
    port: 8080
    description: REST adapter for Autodesk Webhooks API — Tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhooks/v1/tokens/me
      name: webhooks-v1-tokens-me
      description: REST surface for webhooks-v1-tokens-@me.
      operations:
      - method: PUT
        name: createtoken
        description: Autodesk Create/Update Webhook Secret Token
        call: webhooks-tokens.createtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetoken
        description: Autodesk Delete Webhook Secret Token
        call: webhooks-tokens.deletetoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Webhooks API — Tokens. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: autodesk-create-update-webhook-secret
      description: Autodesk Create/Update Webhook Secret Token
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks-tokens.createtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-delete-webhook-secret-token
      description: Autodesk Delete Webhook Secret Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: webhooks-tokens.deletetoken
      outputParameters:
      - type: object
        mapping: $.
