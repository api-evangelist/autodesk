naftiko: 1.0.0-alpha2
info:
  label: Autodesk Design Automation API — Forge Apps
  description: 'Autodesk Design Automation API — Forge Apps. 3 operations. Lead operation: Autodesk Get Nickname. Self-contained
    Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Forge Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: design-automation-forge-apps
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Design Automation API — Forge Apps business capability. Self-contained, no shared references.
    resources:
    - name: da-us-east-v3-forgeapps-me
      path: /da/us-east/v3/forgeapps/me
      operations:
      - name: getnickname
        method: GET
        description: Autodesk Get Nickname
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletenickname
        method: DELETE
        description: Autodesk Delete Nickname
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnickname
        method: PATCH
        description: Autodesk Create/Update Nickname
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: design-automation-forge-apps-rest
    port: 8080
    description: REST adapter for Autodesk Design Automation API — Forge Apps. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/da/us-east/v3/forgeapps/me
      name: da-us-east-v3-forgeapps-me
      description: REST surface for da-us-east-v3-forgeapps-me.
      operations:
      - method: GET
        name: getnickname
        description: Autodesk Get Nickname
        call: design-automation-forge-apps.getnickname
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenickname
        description: Autodesk Delete Nickname
        call: design-automation-forge-apps.deletenickname
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: createnickname
        description: Autodesk Create/Update Nickname
        call: design-automation-forge-apps.createnickname
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: design-automation-forge-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Design Automation API — Forge Apps. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: autodesk-get-nickname
      description: Autodesk Get Nickname
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: design-automation-forge-apps.getnickname
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-delete-nickname
      description: Autodesk Delete Nickname
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: design-automation-forge-apps.deletenickname
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-create-update-nickname
      description: Autodesk Create/Update Nickname
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: design-automation-forge-apps.createnickname
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
