          in: path
          type: string
          required: true
        - name: issueId
          in: path
          type: string
          required: true
      - name: updateissue
        method: PATCH
        description: Autodesk Update Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: containerId
          in: path
          type: string
          required: true
        - name: issueId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
