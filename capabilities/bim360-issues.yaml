      path: /issues/v1/containers/{containerId}/issue-types
      operations:
      - name: getissuetypes
        method: GET
        description: Autodesk List Issue Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: containerId
          in: path
          type: string
          required: true
    - name: issues-v1-containers-containerId-quality-issues
      path: /issues/v1/containers/{containerId}/quality-issues
      operations:
      - name: getissues
        method: GET
        description: Autodesk List Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: containerId
          in: path
          type: string
          description: The issues container ID for the project.
          required: true
        - name: filter[status]
          in: query
          type: string
        - name: filter[assigned_to]
          in: query
          type: string
        - name: filter[due_date]
          in: query
          type: string
        - name: filter[created_at]
          in: query
          type: string
        - name: filter[target_urn]
          in: query
          type: string
        - name: page[limit]
          in: query
          type: integer
        - name: page[offset]
          in: query
          type: integer
      - name: createissue
        method: POST
        description: Autodesk Create Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: containerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: issues-v1-containers-containerId-quality-issues-issueId
      path: /issues/v1/containers/{containerId}/quality-issues/{issueId}
      operations:
      - name: getissue
        method: GET
        description: Autodesk Get Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
