        name: getissue
        description: Autodesk Get Issue
        call: bim360-issues.getissue
        with:
          containerId: rest.containerId
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateissue
