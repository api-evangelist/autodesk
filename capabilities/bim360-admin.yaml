naftiko: 1.0.0-alpha2
info:
  label: Autodesk BIM 360 API — Admin
  description: 'Autodesk BIM 360 API — Admin. 3 operations. Lead operation: Autodesk List Project Users. Self-contained Naftiko
    capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Admin
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: bim360-admin
    baseUri: https://developer.api.autodesk.com
    description: Autodesk BIM 360 API — Admin business capability. Self-contained, no shared references.
    resources:
    - name: bim360-admin-v1-projects-projectId-users
      path: /bim360/admin/v1/projects/{projectId}/users
      operations:
      - name: getbim360projectusers
        method: GET
        description: Autodesk List Project Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: addbim360projectuser
        method: POST
        description: Autodesk Add Project User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bim360-admin-v1-projects-projectId-users-import
      path: /bim360/admin/v1/projects/{projectId}/users/import
      operations:
      - name: importbim360projectusers
        method: POST
        description: Autodesk Import Project Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: bim360-admin-rest
    port: 8080
    description: REST adapter for Autodesk BIM 360 API — Admin. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bim360/admin/v1/projects/{projectid}/users
      name: bim360-admin-v1-projects-projectid-users
      description: REST surface for bim360-admin-v1-projects-projectId-users.
      operations:
      - method: GET
        name: getbim360projectusers
        description: Autodesk List Project Users
        call: bim360-admin.getbim360projectusers
        with:
          projectId: rest.projectId
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addbim360projectuser
        description: Autodesk Add Project User
        call: bim360-admin.addbim360projectuser
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bim360/admin/v1/projects/{projectid}/users/import
      name: bim360-admin-v1-projects-projectid-users-import
      description: REST surface for bim360-admin-v1-projects-projectId-users-import.
      operations:
      - method: POST
        name: importbim360projectusers
        description: Autodesk Import Project Users
        call: bim360-admin.importbim360projectusers
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bim360-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk BIM 360 API — Admin. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: autodesk-list-project-users
      description: Autodesk List Project Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bim360-admin.getbim360projectusers
      with:
        projectId: tools.projectId
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-add-project-user
      description: Autodesk Add Project User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bim360-admin.addbim360projectuser
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-import-project-users
      description: Autodesk Import Project Users
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bim360-admin.importbim360projectusers
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
