naftiko: 1.0.0-alpha2
info:
  label: Autodesk Model Derivative API — Manifest
  description: 'Autodesk Model Derivative API — Manifest. 2 operations. Lead operation: Autodesk Get Manifest. Self-contained
    Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Manifest
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: model-derivative-manifest
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Model Derivative API — Manifest business capability. Self-contained, no shared references.
    resources:
    - name: modelderivative-v2-designdata-urn-manifest
      path: /modelderivative/v2/designdata/{urn}/manifest
      operations:
      - name: getmanifest
        method: GET
        description: Autodesk Get Manifest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: urn
          in: path
          type: string
          description: The Base64 (URL-safe) encoded URN of the source design.
          required: true
      - name: deletemanifest
        method: DELETE
        description: Autodesk Delete Manifest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: urn
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: model-derivative-manifest-rest
    port: 8080
    description: REST adapter for Autodesk Model Derivative API — Manifest. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/modelderivative/v2/designdata/{urn}/manifest
      name: modelderivative-v2-designdata-urn-manifest
      description: REST surface for modelderivative-v2-designdata-urn-manifest.
      operations:
      - method: GET
        name: getmanifest
        description: Autodesk Get Manifest
        call: model-derivative-manifest.getmanifest
        with:
          urn: rest.urn
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemanifest
        description: Autodesk Delete Manifest
        call: model-derivative-manifest.deletemanifest
        with:
          urn: rest.urn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: model-derivative-manifest-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Model Derivative API — Manifest. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: autodesk-get-manifest
      description: Autodesk Get Manifest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: model-derivative-manifest.getmanifest
      with:
        urn: tools.urn
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-delete-manifest
      description: Autodesk Delete Manifest
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: model-derivative-manifest.deletemanifest
      with:
        urn: tools.urn
      outputParameters:
      - type: object
        mapping: $.
