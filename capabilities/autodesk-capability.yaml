          in: path
          type: string
          required: true
        - name: filter[status]
          in: query
          type: string
        - name: filter[name]
          in: query
          type: string
        - name: filter[platform]
          in: query
          type: string
        - name: sort
          in: query
          type: string
          description: Sort field and direction (e.g., name asc, startDate desc).
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
