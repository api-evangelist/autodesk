naftiko: 1.0.0-alpha2
info:
  label: Autodesk Tandem Data API — Twins
  description: 'Autodesk Tandem Data API — Twins. 2 operations. Lead operation: Autodesk List Twins. Self-contained Naftiko
    capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Twins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: tandem-data-twins
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Tandem Data API — Twins business capability. Self-contained, no shared references.
    resources:
    - name: tandem-v1-twins
      path: /tandem/v1/twins
      operations:
      - name: gettwins
        method: GET
        description: Autodesk List Twins
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tandem-v1-twins-twinId
      path: /tandem/v1/twins/{twinId}
      operations:
      - name: gettwin
        method: GET
        description: Autodesk Get Twin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: twinId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: tandem-data-twins-rest
    port: 8080
    description: REST adapter for Autodesk Tandem Data API — Twins. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tandem/v1/twins
      name: tandem-v1-twins
      description: REST surface for tandem-v1-twins.
      operations:
      - method: GET
        name: gettwins
        description: Autodesk List Twins
        call: tandem-data-twins.gettwins
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tandem/v1/twins/{twinid}
      name: tandem-v1-twins-twinid
      description: REST surface for tandem-v1-twins-twinId.
      operations:
      - method: GET
        name: gettwin
        description: Autodesk Get Twin
        call: tandem-data-twins.gettwin
        with:
          twinId: rest.twinId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tandem-data-twins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Tandem Data API — Twins. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: autodesk-list-twins
      description: Autodesk List Twins
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tandem-data-twins.gettwins
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-get-twin
      description: Autodesk Get Twin
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tandem-data-twins.gettwin
      with:
        twinId: tools.twinId
      outputParameters:
      - type: object
        mapping: $.
