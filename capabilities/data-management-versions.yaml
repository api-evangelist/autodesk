naftiko: 1.0.0-alpha2
info:
  label: Autodesk Data Management API — Versions
  description: 'Autodesk Data Management API — Versions. 3 operations. Lead operation: Autodesk List Item Versions. Self-contained
    Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-management-versions
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Data Management API — Versions business capability. Self-contained, no shared references.
    resources:
    - name: data-v1-projects-project_id-items-item_id-versions
      path: /data/v1/projects/{project_id}/items/{item_id}/versions
      operations:
      - name: getitemversions
        method: GET
        description: Autodesk List Item Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
        - name: item_id
          in: path
          type: string
          required: true
        - name: page[number]
          in: query
          type: integer
        - name: page[limit]
          in: query
          type: integer
    - name: data-v1-projects-project_id-versions
      path: /data/v1/projects/{project_id}/versions
      operations:
      - name: createversion
        method: POST
        description: Autodesk Create Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: data-v1-projects-project_id-versions-version_id
      path: /data/v1/projects/{project_id}/versions/{version_id}
      operations:
      - name: getversion
        method: GET
        description: Autodesk Get Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          required: true
        - name: version_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-management-versions-rest
    port: 8080
    description: REST adapter for Autodesk Data Management API — Versions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/data/v1/projects/{project-id}/items/{item-id}/versions
      name: data-v1-projects-project-id-items-item-id-versions
      description: REST surface for data-v1-projects-project_id-items-item_id-versions.
      operations:
      - method: GET
        name: getitemversions
        description: Autodesk List Item Versions
        call: data-management-versions.getitemversions
        with:
          project_id: rest.project_id
          item_id: rest.item_id
          page[number]: rest.page[number]
          page[limit]: rest.page[limit]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/v1/projects/{project-id}/versions
      name: data-v1-projects-project-id-versions
      description: REST surface for data-v1-projects-project_id-versions.
      operations:
      - method: POST
        name: createversion
        description: Autodesk Create Version
        call: data-management-versions.createversion
        with:
          project_id: rest.project_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/v1/projects/{project-id}/versions/{version-id}
      name: data-v1-projects-project-id-versions-version-id
      description: REST surface for data-v1-projects-project_id-versions-version_id.
      operations:
      - method: GET
        name: getversion
        description: Autodesk Get Version
        call: data-management-versions.getversion
        with:
          project_id: rest.project_id
          version_id: rest.version_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-management-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Data Management API — Versions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: autodesk-list-item-versions
      description: Autodesk List Item Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-management-versions.getitemversions
      with:
        project_id: tools.project_id
        item_id: tools.item_id
        page[number]: tools.page[number]
        page[limit]: tools.page[limit]
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-create-version
      description: Autodesk Create Version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-management-versions.createversion
      with:
        project_id: tools.project_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-get-version
      description: Autodesk Get Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-management-versions.getversion
      with:
        project_id: tools.project_id
        version_id: tools.version_id
      outputParameters:
      - type: object
        mapping: $.
