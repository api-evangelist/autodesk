naftiko: 1.0.0-alpha2
info:
  label: Autodesk Model Derivative API — Thumbnails
  description: 'Autodesk Model Derivative API — Thumbnails. 1 operations. Lead operation: Autodesk Get Thumbnail. Self-contained
    Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Thumbnails
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: model-derivative-thumbnails
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Model Derivative API — Thumbnails business capability. Self-contained, no shared references.
    resources:
    - name: modelderivative-v2-designdata-urn-thumbnail
      path: /modelderivative/v2/designdata/{urn}/thumbnail
      operations:
      - name: getthumbnail
        method: GET
        description: Autodesk Get Thumbnail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: urn
          in: path
          type: string
          required: true
        - name: width
          in: query
          type: integer
          description: Width of the thumbnail in pixels (100, 200, or 400).
        - name: height
          in: query
          type: integer
          description: Height of the thumbnail in pixels (100, 200, or 400).
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: model-derivative-thumbnails-rest
    port: 8080
    description: REST adapter for Autodesk Model Derivative API — Thumbnails. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/modelderivative/v2/designdata/{urn}/thumbnail
      name: modelderivative-v2-designdata-urn-thumbnail
      description: REST surface for modelderivative-v2-designdata-urn-thumbnail.
      operations:
      - method: GET
        name: getthumbnail
        description: Autodesk Get Thumbnail
        call: model-derivative-thumbnails.getthumbnail
        with:
          urn: rest.urn
          width: rest.width
          height: rest.height
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: model-derivative-thumbnails-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Model Derivative API — Thumbnails. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: autodesk-get-thumbnail
      description: Autodesk Get Thumbnail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: model-derivative-thumbnails.getthumbnail
      with:
        urn: tools.urn
        width: tools.width
        height: tools.height
      outputParameters:
      - type: object
        mapping: $.
