naftiko: 1.0.0-alpha2
info:
  label: Autodesk Flow Graph Engine API — Jobs
  description: 'Autodesk Flow Graph Engine API — Jobs. 5 operations. Lead operation: Autodesk List Jobs. Self-contained Naftiko
    capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: flow-graph-engine-jobs
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Flow Graph Engine API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: fge-v1-jobs
      path: /fge/v1/jobs
      operations:
      - name: getjobs
        method: GET
        description: Autodesk List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[status]
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createjob
        method: POST
        description: Autodesk Create Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: fge-v1-jobs-jobId
      path: /fge/v1/jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Autodesk Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
      - name: canceljob
        method: DELETE
        description: Autodesk Cancel Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    - name: fge-v1-jobs-jobId-result
      path: /fge/v1/jobs/{jobId}/result
      operations:
      - name: getjobresult
        method: GET
        description: Autodesk Get Job Result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: flow-graph-engine-jobs-rest
    port: 8080
    description: REST adapter for Autodesk Flow Graph Engine API — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fge/v1/jobs
      name: fge-v1-jobs
      description: REST surface for fge-v1-jobs.
      operations:
      - method: GET
        name: getjobs
        description: Autodesk List Jobs
        call: flow-graph-engine-jobs.getjobs
        with:
          filter[status]: rest.filter[status]
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createjob
        description: Autodesk Create Job
        call: flow-graph-engine-jobs.createjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fge/v1/jobs/{jobid}
      name: fge-v1-jobs-jobid
      description: REST surface for fge-v1-jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Autodesk Get Job
        call: flow-graph-engine-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: canceljob
        description: Autodesk Cancel Job
        call: flow-graph-engine-jobs.canceljob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fge/v1/jobs/{jobid}/result
      name: fge-v1-jobs-jobid-result
      description: REST surface for fge-v1-jobs-jobId-result.
      operations:
      - method: GET
        name: getjobresult
        description: Autodesk Get Job Result
        call: flow-graph-engine-jobs.getjobresult
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flow-graph-engine-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Flow Graph Engine API — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: autodesk-list-jobs
      description: Autodesk List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-graph-engine-jobs.getjobs
      with:
        filter[status]: tools.filter[status]
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-create-job
      description: Autodesk Create Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: flow-graph-engine-jobs.createjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-get-job
      description: Autodesk Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-graph-engine-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-cancel-job
      description: Autodesk Cancel Job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: flow-graph-engine-jobs.canceljob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: autodesk-get-job-result
      description: Autodesk Get Job Result
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flow-graph-engine-jobs.getjobresult
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
