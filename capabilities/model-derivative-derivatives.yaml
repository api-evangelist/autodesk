naftiko: 1.0.0-alpha2
info:
  label: Autodesk Model Derivative API — Derivatives
  description: 'Autodesk Model Derivative API — Derivatives. 1 operations. Lead operation: Autodesk Download Derivative. Self-contained
    Naftiko capability covering one Autodesk business surface.'
  tags:
  - Autodesk
  - Derivatives
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AUTODESK_API_KEY: AUTODESK_API_KEY
capability:
  consumes:
  - type: http
    namespace: model-derivative-derivatives
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Model Derivative API — Derivatives business capability. Self-contained, no shared references.
    resources:
    - name: modelderivative-v2-designdata-urn-manifest-derivativeUrn
      path: /modelderivative/v2/designdata/{urn}/manifest/{derivativeUrn}
      operations:
      - name: getderivativedownload
        method: GET
        description: Autodesk Download Derivative
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: urn
          in: path
          type: string
          required: true
        - name: derivativeUrn
          in: path
          type: string
          description: URL-encoded URN of the derivative.
          required: true
    authentication:
      type: bearer
      token: '{{env.AUTODESK_API_KEY}}'
  exposes:
  - type: rest
    namespace: model-derivative-derivatives-rest
    port: 8080
    description: REST adapter for Autodesk Model Derivative API — Derivatives. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/modelderivative/v2/designdata/{urn}/manifest/{derivativeurn}
      name: modelderivative-v2-designdata-urn-manifest-derivativeurn
      description: REST surface for modelderivative-v2-designdata-urn-manifest-derivativeUrn.
      operations:
      - method: GET
        name: getderivativedownload
        description: Autodesk Download Derivative
        call: model-derivative-derivatives.getderivativedownload
        with:
          urn: rest.urn
          derivativeUrn: rest.derivativeUrn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: model-derivative-derivatives-mcp
    port: 9090
    transport: http
    description: MCP adapter for Autodesk Model Derivative API — Derivatives. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: autodesk-download-derivative
      description: Autodesk Download Derivative
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: model-derivative-derivatives.getderivativedownload
      with:
        urn: tools.urn
        derivativeUrn: tools.derivativeUrn
      outputParameters:
      - type: object
        mapping: $.
