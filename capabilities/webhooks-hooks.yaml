    description: Autodesk Webhooks API — Hooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks-v1-hooks
      path: /webhooks/v1/hooks
      operations:
      - name: getallhooks
        method: GET
        description: Autodesk List All Hooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageState
          in: query
          type: string
        - name: status
          in: query
          type: string
    - name: webhooks-v1-systems-system-events-event-hooks
      path: /webhooks/v1/systems/{system}/events/{event}/hooks
      operations:
      - name: gethooks
        method: GET
        description: Autodesk List Hooks for Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system
          in: path
          type: string
          required: true
        - name: event
          in: path
          type: string
          description: The event type (e.g., dm.version.added, dm.version.deleted, extraction.finished).
          required: true
        - name: pageState
          in: query
          type: string
          description: Pagination state token.
        - name: status
          in: query
          type: string
          description: Filter by hook status.
      - name: createhook
        method: POST
        description: Autodesk Create Hook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system
          in: path
          type: string
          required: true
        - name: event
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-v1-systems-system-events-event-hooks-hook_id
      path: /webhooks/v1/systems/{system}/events/{event}/hooks/{hook_id}
      operations:
      - name: gethook
        method: GET
        description: Autodesk Get Hook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system
          in: path
          type: string
          required: true
        - name: event
          in: path
          type: string
          required: true
        - name: hook_id
          in: path
          type: string
          description: The unique hook identifier.
          required: true
      - name: updatehook
        method: PATCH
        description: Autodesk Update Hook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system
          in: path
          type: string
          required: true
        - name: event
          in: path
          type: string
          required: true
        - name: hook_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletehook
        method: DELETE
        description: Autodesk Delete Hook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system
          in: path
          type: string
          required: true
        - name: event
          in: path
          type: string
          required: true
