      name: webhooks-v1-systems-system-events-event-hooks
      description: REST surface for webhooks-v1-systems-system-events-event-hooks.
      operations:
      - method: GET
        name: gethooks
        description: Autodesk List Hooks for Event
        call: webhooks-hooks.gethooks
        with:
          system: rest.system
          event: rest.event
