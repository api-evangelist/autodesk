        name: gethook
        description: Autodesk Get Hook
        call: webhooks-hooks.gethook
        with:
          system: rest.system
          event: rest.event
          hook_id: rest.hook_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatehook
        description: Autodesk Update Hook
        call: webhooks-hooks.updatehook
        with:
          system: rest.system
          event: rest.event
          hook_id: rest.hook_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
