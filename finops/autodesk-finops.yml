specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Autodesk
providerId: autodesk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - 3D Modeling
  - BIM
  - CAD
  - Construction
  - Engineering
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Autodesk — hybrid model combining (a) per-seat product subscriptions
  for desktop/cloud apps (AutoCAD, Revit, etc.) and (b) Cloud Credit-metered APS API consumption for
  Model Derivative, Design Automation, Reality Capture, and Data Exchange. Authentication / Data Management
  / Webhooks / Viewer APIs are free.
sources:
  - https://aps.autodesk.com/pricing
  - https://www.autodesk.com/pricing
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Autodesk, Inc.
serviceCategory: Design / Engineering Software / Platform APIs
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go (Cloud Credits)
  billingFrequency: Monthly / Annual (subscriptions); On-Demand (Cloud Credits)
  billingCurrency: USD (settlement varies by region)
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Autodesk Platform Services
  ServiceCategory: Design / Engineering Software
  ServiceSubcategory: Platform APIs (APS)
  ProviderName: Autodesk
  PublisherName: Autodesk, Inc.
  InvoiceIssuerName: Autodesk, Inc.
  BillingCurrency: USD
  PricingCategory: Subscription + Pay-As-You-Go
meters:
  - name: cloud_credits_consumed
    description: Cloud Credits consumed by chargeable APS API operations
    unit: credit
    aggregation: sum
    dimensions:
      - api
      - operation
      - app
      - region
  - name: model_derivative_translations
    description: Model Derivative translation jobs (counted toward Cloud Credits)
    unit: job
    aggregation: sum
    dimensions:
      - source_format
      - target_format
      - app
  - name: design_automation_minutes
    description: Design Automation cloud-engine minutes consumed
    unit: minute
    aggregation: sum
    dimensions:
      - engine
      - work_item
      - app
  - name: reality_capture_processing
    description: Reality Capture photo-processing jobs (Cloud Credits)
    unit: job
    aggregation: sum
    dimensions:
      - resolution
      - photo_count
  - name: product_seats
    description: Per-seat Autodesk product subscriptions (AutoCAD, Revit, Inventor, Maya, etc.)
    unit: seat-month
    aggregation: max
    dimensions:
      - product
      - plan
  - name: storage_consumption
    description: Storage consumed in Autodesk Docs / BIM 360 Docs / OSS buckets
    unit: GB-month
    aggregation: max
    dimensions:
      - hub
      - region
principles:
  - name: Visibility
    description: Use the APS console Cloud Credit usage report and the Autodesk Account portal to surface
      credit consumption per app and per API; pair with the Authentication API audit logs to attribute
      activity to specific tokens/integrations.
  - name: Allocation
    description: Tag APS apps (client_id) by consuming team or product line; map Autodesk product seats
      to cost centers via Autodesk Account groups. Allocate Cloud Credits by API and by source/target
      format dimensions.
  - name: Optimization
    description: Cache Model Derivative translations by source-file SHA and parameters to avoid re-translating
      identical inputs. Tear down Design Automation work items promptly; choose the smallest engine variant
      that satisfies the job. For Reality Capture, downsample photo sets and avoid re-processing on metadata-only
      changes.
  - name: Accountability
    description: Engineering / BIM-platform team owns APS app entitlements and Cloud Credit budget; review
      monthly via the APS usage dashboard. Set alerts on Cloud Credit balance thresholds (e.g. 25% remaining)
      to prevent translation outages.
maintainers:
